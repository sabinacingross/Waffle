<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waffle Cat - Positive Vibes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <div class="title-box">
            <h1>Waffle the Cat</h1>
            <p class="subtitle">for my beloved brother Martin :]</p>
        </div>
        
        <div class="image-note-row">
            <div class="waffle-cat">
                <img src="Copilot_20260622_112028.png" alt="Waffle Cat" class="waffle-image" />
            </div>
            <div class="note-box">
                <p>If you are Sabina's brother Martin, click for your saying.</p>
                <p class="note-subtext">If not... then still click :]</p>
            </div>
        </div>
        
        <button id="sayingBtn" class="glow-button">✨ Get a Positive Saying ✨</button>
        
        <div class="content-wrapper">
            <div class="emoji-container" id="emojiContainer" aria-hidden="true">
                <span>✨</span>
                <span>💫</span>
                <span>🎉</span>
                <span>🌟</span>
                <span>💖</span>
            </div>
            
            <div class="saying-box" id="sayingBox">
                <p id="saying">Click the button to get inspired!</p>
            </div>
        </div>
        
        <div class="sparkles">
            <span class="sparkle">✨</span>
            <span class="sparkle">💫</span>
            <span class="sparkle">⭐</span>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
