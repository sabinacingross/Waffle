<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waffle Cat - Positive Vibes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <h1>Waffle the cat
            for my beloved brother Martin :]
        </h1>
        
        <div class="waffle-cat">
            <img src="Copilot_20260622_112028.png" alt="Waffle Cat" class="waffle-image" />
        </div>
        
        <button id="sayingBtn" class="glow-button">✨ Get a Positive Saying ✨</button>
        
        <div class="content-wrapper">
            <div class="picture-container" id="pictureContainer">
                <svg id="decorationSvg" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
            
            <div class="saying-box" id="sayingBox">
                <p id="saying">Click the button to get inspired!</p>
            </div>
        </div>
        
        <div class="sparkles">
            <span class="sparkle">✨</span>
            <span class="sparkle">💫</span>
            <span class="sparkle">⭐</span>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
