<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waffle Cat - Positive Vibes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <h1>🧇 Waffle Cat 🧇</h1>
        
        <div class="waffle-cat">
            <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="waffleBg" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#E8C089;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#D4A574;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#B8915F;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="headGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#E8C089;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#C89968;stop-opacity:1" />
                    </linearGradient>
                    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
                        <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
                    </filter>
                </defs>
                <!-- Waffle body with 3D effect -->
                <g filter="url(#shadow)">
                    <!-- Shadow under waffle -->
                    <ellipse cx="100" cy="195" rx="65" ry="8" fill="#000" opacity="0.15"/>
                    <!-- Main waffle body -->
                    <rect x="40" y="80" width="120" height="110" rx="15" fill="url(#waffleBg)" stroke="#A67C52" stroke-width="2.5"/>
                    <!-- Highlight for 3D effect -->
                    <rect x="42" y="82" width="116" height="15" rx="13" fill="#F5D9B8" opacity="0.4" stroke="none"/>
                </g>
                
                <!-- Waffle grid pattern -->
                <line x1="60" y1="80" x2="60" y2="190" stroke="#C89968" stroke-width="1" opacity="0.5"/>
                <line x1="80" y1="80" x2="80" y2="190" stroke="#C89968" stroke-width="1" opacity="0.5"/>
                <line x1="100" y1="80" x2="100" y2="190" stroke="#C89968" stroke-width="1" opacity="0.5"/>
                <line x1="120" y1="80" x2="120" y2="190" stroke="#C89968" stroke-width="1" opacity="0.5"/>
                <line x1="140" y1="80" x2="140" y2="190" stroke="#C89968" stroke-width="1" opacity="0.5"/>
                <line x1="160" y1="80" x2="160" y2="190" stroke="#C89968" stroke-width="1" opacity="0.5"/>
                
                <line x1="40" y1="105" x2="160" y2="105" stroke="#C89968" stroke-width="1" opacity="0.5"/>
                <line x1="40" y1="130" x2="160" y2="130" stroke="#C89968" stroke-width="1" opacity="0.5"/>
                <line x1="40" y1="155" x2="160" y2="155" stroke="#C89968" stroke-width="1" opacity="0.5"/>
                <line x1="40" y1="180" x2="160" y2="180" stroke="#C89968" stroke-width="1" opacity="0.5"/>
                
                <!-- Syrup drizzle -->
                <circle cx="80" cy="95" r="4" fill="#8B4513" opacity="0.6"/>
                <circle cx="120" cy="115" r="4" fill="#8B4513" opacity="0.6"/>
                <circle cx="100" cy="170" r="5" fill="#8B4513" opacity="0.6"/>
                
                <!-- Cute tail (swirly) -->
                <path d="M 155 100 Q 170 95 175 110 Q 178 130 170 145" stroke="#D4A574" stroke-width="12" fill="none" stroke-linecap="round"/>
                <path d="M 155 100 Q 170 95 175 110 Q 178 130 170 145" stroke="url(#waffleBg)" stroke-width="10" fill="none" stroke-linecap="round"/>
                
                <!-- Paws (feet) -->
                <ellipse cx="55" cy="185" rx="12" ry="8" fill="#D4A574" stroke="#A67C52" stroke-width="2"/>
                <ellipse cx="85" cy="190" rx="12" ry="8" fill="#D4A574" stroke="#A67C52" stroke-width="2"/>
                <ellipse cx="115" cy="190" rx="12" ry="8" fill="#D4A574" stroke="#A67C52" stroke-width="2"/>
                <ellipse cx="145" cy="185" rx="12" ry="8" fill="#D4A574" stroke="#A67C52" stroke-width="2"/>
                
                <!-- Paw toe marks -->
                <circle cx="50" cy="190" r="2" fill="#A67C52"/>
                <circle cx="58" cy="190" r="2" fill="#A67C52"/>
                <circle cx="80" cy="197" r="2" fill="#A67C52"/>
                <circle cx="90" cy="197" r="2" fill="#A67C52"/>
                <circle cx="110" cy="197" r="2" fill="#A67C52"/>
                <circle cx="120" cy="197" r="2" fill="#A67C52"/>
                <circle cx="140" cy="190" r="2" fill="#A67C52"/>
                <circle cx="150" cy="190" r="2" fill="#A67C52"/>
                
                <!-- Head with 3D shading -->
                <g filter="url(#shadow)">
                    <circle cx="100" cy="45" r="35" fill="url(#headGradient)" stroke="#A67C52" stroke-width="2.5"/>
                    <!-- 3D highlight on head -->
                    <circle cx="88" cy="25" r="12" fill="#F5D9B8" opacity="0.5"/>
                </g>
                
                <!-- Ears (cat shaped) with 3D effect -->
                <polygon points="70,15 60,0 75,20" fill="#D4A574" stroke="#A67C52" stroke-width="2"/>
                <polygon points="130,15 140,0 125,20" fill="#D4A574" stroke="#A67C52" stroke-width="2"/>
                
                <!-- Inner ear pink with gradient -->
                <g>
                    <polygon points="70,12 65,3 72,16" fill="#FF69B4" opacity="0.7"/>
                    <polygon points="130,12 135,3 128,16" fill="#FF69B4" opacity="0.7"/>
                </g>
                
                <!-- Ear shadows for depth -->
                <polygon points="68,14 62,8 70,18" fill="#D98BB8" opacity="0.4"/>
                <polygon points="132,14 138,8 130,18" fill="#D98BB8" opacity="0.4"/>
                
                <!-- Eyes with shine for 3D look -->
                <g>
                    <!-- Left eye -->
                    <circle cx="85" cy="40" r="5" fill="#1a1a1a"/>
                    <circle cx="85" cy="40" r="4" fill="#000"/>
                    <circle cx="86.5" cy="38.5" r="2" fill="#fff" opacity="0.8"/>
                    <circle cx="86.5" cy="38.5" r="1" fill="#e0f7ff" opacity="0.6"/>
                    
                    <!-- Right eye -->
                    <circle cx="115" cy="40" r="5" fill="#1a1a1a"/>
                    <circle cx="115" cy="40" r="4" fill="#000"/>
                    <circle cx="116.5" cy="38.5" r="2" fill="#fff" opacity="0.8"/>
                    <circle cx="116.5" cy="38.5" r="1" fill="#e0f7ff" opacity="0.6"/>
                </g>
                
                <!-- Cute blush/cheeks -->
                <ellipse cx="70" cy="52" rx="8" ry="6" fill="#FF69B4" opacity="0.3"/>
                <ellipse cx="130" cy="52" rx="8" ry="6" fill="#FF69B4" opacity="0.3"/>
                
                <!-- Nose with 3D -->
                <polygon points="100,50 97,56 103,56" fill="#FF69B4"/>
                <polygon points="100,50 97,56 100,55" fill="#E84BA5" opacity="0.6"/>
                
                <!-- Happy mouth (big smile) -->
                <path d="M 100 56 Q 95 62 88 60" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <path d="M 100 56 Q 105 62 112 60" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <!-- Tongue -->
                <ellipse cx="100" cy="62" rx="6" ry="4" fill="#FFB6C1" opacity="0.8"/>
                
                <!-- Whiskers (more expressive) -->
                <line x1="60" y1="44" x2="35" y2="40" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="60" y1="50" x2="35" y2="48" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="60" y1="56" x2="35" y2="58" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
                
                <line x1="140" y1="44" x2="165" y2="40" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="140" y1="50" x2="165" y2="48" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="140" y1="56" x2="165" y2="58" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </div>
        
        <button id="sayingBtn" class="glow-button">✨ Get a Positive Saying ✨</button>
        
        <div class="content-wrapper">
            <div class="picture-container" id="pictureContainer">
                <svg id="decorationSvg" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
            
            <div class="saying-box" id="sayingBox">
                <p id="saying">Click the button to get inspired!</p>
            </div>
        </div>
        
        <div class="sparkles">
            <span class="sparkle">✨</span>
            <span class="sparkle">💫</span>
            <span class="sparkle">⭐</span>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
